<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Michael CEO Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local-first daily ops</p>
          <h1>Michael CEO Dashboard</h1>
        </div>
        <nav class="topnav">
          <a href="/">Dashboard</a>
          <a href="/mobile">Mobile Update</a>
        </nav>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>
